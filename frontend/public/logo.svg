<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cernova logomark, wireframe style">
  <g fill="none" stroke="#7C3AED" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer nova star -->
    <path stroke-width="9" d="M256,32 L307,205 L480,256 L307,307 L256,480 L205,307 L32,256 L205,205 Z"/>

    <!-- Facet lines: tip to core -->
    <g stroke-width="5">
      <line x1="256" y1="32"  x2="256" y2="212"/>
      <line x1="480" y1="256" x2="300" y2="256"/>
      <line x1="256" y1="480" x2="256" y2="300"/>
      <line x1="32"  y1="256" x2="212" y2="256"/>
    </g>

    <!-- Core diamond -->
    <path stroke-width="9" d="M256,212 L300,256 L256,300 L212,256 Z"/>

    <!-- Diagonal crystal shards -->
    <g stroke-width="9">
      <path d="M323,189 L333,156 L373,139 L356,179 Z"/>
      <path d="M323,323 L356,333 L373,373 L333,356 Z"/>
      <path d="M189,323 L156,333 L139,373 L179,356 Z"/>
      <path d="M189,189 L179,156 L139,139 L156,179 Z"/>
    </g>
  </g>
</svg>
